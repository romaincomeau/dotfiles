[env]
TERM = "xterm-256color"

[window]
decorations = "full"
dynamic_title = true
opacity = 1.0

[window.padding]
x = 8
y = 0

[font]
size = 20.0

[font.normal]
family = "JetBrains Mono"
style = "Regular"

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[font.italic]
family = "JetBrains Mono"
style = "Italic"

[colors.primary]
background = "0x181818"
foreground = "0xd8d8d8"

[colors.normal]
black   = "0x181818"
red     = "0xab4642"
green   = "0xa1b56c"
yellow  = "0xf7ca88"
blue    = "0x7cafc2"
magenta = "0xba8baf"
cyan    = "0x86c1b9"
white   = "0xd8d8d8"

[colors.bright]
black   = "0x585858"
red     = "0xab4642"
green   = "0xa1b56c"
yellow  = "0xf7ca88"
blue    = "0x7cafc2"
magenta = "0xba8baf"
cyan    = "0x86c1b9"
white   = "0xf8f8f8"

[cursor]
# block, underline, beam
style = "Block"
blink_interval = 0

[scrolling]
history = 5000
multiplier = 3

[[keyboard.bindings]]
key = "N"
mods = "Control|Shift"
action = "SpawnNewInstance"

[[keyboard.bindings]]
key = "F"
mods = "Control|Shift"
action = "ToggleFullscreen"
